name: Bump version

# Manually compute the next semantic version from the latest v* tag, create and
# push that tag, then kick off the Release workflow for it.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of the version to increment
        type: choice
        options: [patch, minor, major]
        default: patch
      prerelease:
        description: Optional pre-release suffix, e.g. "rc1" (leave empty for a normal release)
        type: string
        default: ""

permissions:
  contents: write # push the new tag
  actions: write # dispatch the Release workflow

concurrency: bump-version

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: next
        env:
          BUMP: ${{ inputs.bump }}
          PRE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          core=${latest#v}
          core=${core%%-*} # drop any pre-release suffix
          IFS='.' read -r MAJOR MINOR PATCH <<<"$core"
          : "${MAJOR:=0}" "${MINOR:=0}" "${PATCH:=0}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          next="v${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "$PRE" ]; then next="${next}-${PRE}"; fi
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "tag ${next} already exists" >&2
            exit 1
          fi
          echo "latest=$latest" >>"$GITHUB_OUTPUT"
          echo "next=$next" >>"$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEXT: ${{ steps.next.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

      - name: Trigger Release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.next.outputs.next }}
        run: gh workflow run release.yml --ref "$NEXT"

      - name: Summary
        env:
          LATEST: ${{ steps.next.outputs.latest }}
          NEXT: ${{ steps.next.outputs.next }}
          BUMP: ${{ inputs.bump }}
        run: |
          {
            echo "### Version bump"
            echo ""
            echo "- Bump: \`$BUMP\`"
            echo "- Previous: \`$LATEST\`"
            echo "- New tag: \`$NEXT\` (pushed)"
            echo ""
            echo "Release workflow dispatched for \`$NEXT\`."
          } >>"$GITHUB_STEP_SUMMARY"
